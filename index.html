<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcaje CIAC</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Marcaje CIAC</h1>
      <p>Registro simple de administradores y tutores</p>
    </header>

    <section class="card">
      <div class="grid">
        <div>
          <label for="rol">Rol</label>
          <select id="rol">
            <option value="">Selecciona un rol</option>
            <option value="administrador">Administrador</option>
            <option value="tutor">Tutor</option>
          </select>
        </div>

        <div>
          <label for="nombre">Nombre</label>
          <select id="nombre">
            <option value="">Selecciona una persona</option>
          </select>
        </div>

        <div>
          <label>Bloque detectado</label>
          <div id="bloqueDetectado" class="info-box">Se detectará al registrar</div>
        </div>

        <div>
          <label>Estado detectado</label>
          <div id="estadoDetectado" class="info-box">Se detectará al registrar</div>
        </div>
      </div>

      <div class="field">
        <label for="observacion">Observación</label>
        <textarea id="observacion" rows="3" placeholder="Opcional"></textarea>
      </div>

      <button id="btnRegistrar">Registrar asistencia</button>
      <p id="mensaje" class="mensaje"></p>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>Registros de hoy</h2>
        <button id="btnActualizar" class="secondary">Actualizar</button>
      </div>
      <div id="listaRegistros" class="lista-registros"></div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
